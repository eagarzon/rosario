<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Santo Rosario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B2A;--navy2:#132236;--navy3:#1A2C42;
  --gold:#C9A84C;--goldL:#E8C97A;--cream:#F5EDD6;--gray:#8FA3B1;--dim:#1A2C42;
}
html,body{height:100%;overflow:hidden;background:var(--navy);color:var(--cream);font-family:system-ui,sans-serif;touch-action:none}
#shell{position:fixed;inset:0;display:flex;flex-direction:column}
#topbar{height:36px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;letter-spacing:.04em;flex-shrink:0;position:relative}
#homeBtn{position:absolute;left:0;top:0;height:36px;padding:0 14px;display:flex;align-items:center;cursor:pointer;color:rgba(255,255,255,.75);font-size:18px;background:transparent;border:none}
#progress-wrap{height:3px;background:rgba(255,255,255,.1);flex-shrink:0}
#progress{height:100%;background:var(--gold);transition:width .4s;width:0%}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;-webkit-overflow-scrolling:touch}
#bottombar{height:28px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.06em;flex-shrink:0}

/* Typography */
.big-title{font-family:Georgia,serif;font-size:clamp(28px,6vw,68px);color:var(--gold);font-weight:700;text-align:center;letter-spacing:.04em;line-height:1.1}
.section-title{font-family:Georgia,serif;font-size:clamp(18px,3.5vw,40px);color:var(--gold);font-weight:700;text-align:center;margin-bottom:12px}
.prayer-title{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,26px);color:var(--goldL);font-weight:700;text-align:center;margin-bottom:8px}
.prayer-text{font-size:clamp(12px,2vw,21px);color:var(--cream);line-height:1.65;max-width:min(820px,90vw);width:100%}
.sub-title{font-family:Georgia,serif;font-size:clamp(12px,2vw,22px);color:var(--cream);font-style:italic;text-align:center;margin-top:6px}
.divider{width:60%;max-width:320px;height:1px;background:var(--gold);margin:12px auto;opacity:.6}

/* Buttons */
.btn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:14px clamp(24px,5vw,56px);font-size:clamp(13px,2vw,20px);font-weight:700;cursor:pointer}
.btn-ghost{background:transparent;border:1.5px solid var(--gold);color:var(--gold);border-radius:6px;padding:10px clamp(16px,3vw,36px);font-size:clamp(11px,1.6vw,17px);font-weight:600;cursor:pointer}

/* Tipo grid */
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.5vw,16px);max-width:min(580px,88vw);width:100%;margin:8px 0}
.tipo-btn{border:none;border-radius:8px;padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tipo-btn .tname{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,24px);color:#fff;font-weight:700}
.tipo-btn .tdays{font-size:clamp(9px,1.3vw,13px);color:rgba(255,255,255,.8);font-style:italic}
.tipo-btn .hoy-badge{font-size:10px;background:rgba(255,255,255,.25);border-radius:4px;padding:1px 6px;color:#fff}

/* Cruz */
.cross{width:36px;height:50px;position:relative;margin-bottom:10px;flex-shrink:0}
.cross::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:32%;height:100%;background:var(--gold)}
.cross::after{content:'';position:absolute;top:36%;left:0;right:0;height:28%;background:var(--gold)}

/* Misterio card */
.mist-card{background:var(--navy3);border-radius:10px;padding:clamp(12px,2.5vw,28px);max-width:min(860px,92vw);width:100%;border:1px solid rgba(201,168,76,.25)}
.mist-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.mist-num{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.mist-title{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,26px);color:var(--gold);font-weight:700;line-height:1.2}
.mist-sub{font-size:clamp(9px,1.2vw,13px);color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.mist-med{font-size:clamp(12px,1.9vw,20px);color:var(--cream);line-height:1.6;text-align:justify}
.mist-fruto{margin-top:12px;padding:10px 14px;background:rgba(0,0,0,.2);border-radius:6px;border-left:3px solid var(--gold);font-size:clamp(10px,1.5vw,15px);color:var(--gray)}

/* Cuentas */
.cuentas-row{display:flex;gap:clamp(5px,1.2vw,14px);align-items:center;justify-content:center;margin:12px 0;flex-wrap:wrap}
.cuenta{width:clamp(26px,4.5vw,48px);height:clamp(26px,4.5vw,48px);border-radius:50%;border:2px solid var(--gold);background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:clamp(10px,1.5vw,15px);font-weight:700;color:var(--gray);transition:background .25s,color .25s,border-color .25s}
.cuenta.marcada{color:#fff}

/* Letanias */
.let-list{max-width:min(900px,94vw);width:100%;display:flex;flex-direction:column}
.let-row{display:flex;align-items:center;gap:12px;padding:5px 12px;border-radius:6px;transition:background .2s}
.let-row.activa{background:rgba(201,168,76,.12)}
.let-marker{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--gold);background:transparent;flex-shrink:0;transition:background .25s}
.let-marker.on{background:var(--gold)}
.let-inv{font-size:clamp(11px,1.8vw,19px);color:var(--cream);flex:1}
.let-resp{font-size:clamp(9px,1.4vw,15px);color:var(--goldL);font-style:italic}

/* Nav hint */
#navhint{position:fixed;bottom:32px;left:0;right:0;text-align:center;font-size:11px;color:var(--gray);pointer-events:none;opacity:.7}

/* Page layout helpers */
.page{display:flex;flex-direction:column;align-items:center;width:100%;gap:10px}
.page.centered{justify-content:center;min-height:100%}
</style>
</head>

};

const DIAS = {0:'Gloriosos',1:'Gozosos',2:'Dolorosos',3:'Gloriosos',4:'Luminosos',5:'Dolorosos',6:'Gozosos'};
function detectarTipo(){ return DIAS[new Date().getDay()]; }

// ── State ──────────────────────────────────────────────────────────────────
let steps = [], cur = 0, tipo = 'Gozosos';

function buildSteps(t){
  tipo = t;
  steps = [];
  steps.push({type:'portada'});
  steps.push({type:'iniciales'});
  steps.push({type:'cual-misterio'});
  for(let i=0;i<5;i++){
    steps.push({type:'misterio', idx:i});
    steps.push({type:'padre', idx:i});
    steps.push({type:'decenio', idx:i, cuenta:0});
    steps.push({type:'trio', idx:i});
  }
  steps.push({type:'intenciones', step:0});
  steps.push({type:'letanias', letIdx:0});
  steps.push({type:'oracion-final'});
  steps.push({type:'cierre-final'});
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setUI(topBg, topText, botText, showHome){
  const tb = document.getElementById('topbar');
  tb.style.background = topBg || 'transparent';
  document.getElementById('topLabel').textContent = topText || '';
  document.getElementById('botLabel').textContent = botText || '✦ Ad Maiorem Dei Gloriam ✦';
  document.getElementById('homeBtn').style.display = showHome ? 'flex' : 'none';
  document.getElementById('progress').style.width = cur > 0 ? Math.round(cur/(steps.length-1)*100)+'%' : '0%';
}

function h(tag, attrs, ...children){
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==='class') el.className=v; else if(k==='html') el.innerHTML=v; else el.setAttribute(k,v); });
  children.forEach(c=>{ if(c) el.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return el;
}
function div(attrs, ...c){ return h('div',attrs,...c); }
function p(attrs, ...c){ return h('p',attrs,...c); }
function span(attrs, ...c){ return h('span',attrs,...c); }
function cross(){
  const d = div({class:'cross'});
  return d;
}
function divider(extra){
  const d = div({class:'divider'});
  if(extra) d.setAttribute('style', extra);
  return d;
}
function setMain(el){
  const m = document.getElementById('main');
  m.innerHTML = '';
  m.appendChild(el);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const s = steps[cur];
  const M = DATA.misterios[tipo];
  const ac = M.ac, acL = M.acL;
  const O = DATA.oraciones;

  if(s.type==='portada'){
    const hoy = detectarTipo();
    const Mhoy = DATA.misterios[hoy];
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    setUI('transparent','','✦ Ad Maiorem Dei Gloriam ✦', false);

    const page = div({class:'page centered', style:'gap:10px'});
    page.appendChild(cross());
    page.appendChild(div({class:'big-title', html:'EL SANTO ROSARIO'}));
    page.appendChild(div({class:'sub-title', html:'de la Santísima Virgen María'}));
    page.appendChild(divider());

    const hoyBox = div({style:'background:'+Mhoy.ac+';border-radius:10px;padding:12px 32px;text-align:center;border:2px solid '+Mhoy.acL+';max-width:min(420px,88vw)'});
    hoyBox.appendChild(p({style:'font-size:11px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px'}, 'Hoy es '+dias[new Date().getDay()]+' — corresponden los'));
    hoyBox.appendChild(p({style:'font-family:Georgia,serif;font-size:clamp(20px,3.5vw,38px);color:#fff;font-weight:700;line-height:1.15'}, 'Misterios '+hoy));
    hoyBox.appendChild(p({style:'font-size:11px;color:rgba(255,255,255,.75);margin-top:3px'}, Mhoy.dias));
    page.appendChild(hoyBox);

    const btnHoy = document.createElement('button');
    btnHoy.className = 'btn';
    btnHoy.style.marginTop = '4px';
    btnHoy.textContent = 'Comenzar el Rosario de hoy ›';
    btnHoy.onclick = ()=>elegirTipo(hoy);
    page.appendChild(btnHoy);

    page.appendChild(p({style:'font-size:11px;color:var(--gray);margin-top:2px'}, 'o elige otro conjunto:'));

    const grid = div({class:'tipo-grid'});
    ['Gozosos','Luminosos','Dolorosos','Gloriosos'].forEach(t=>{
      const m = DATA.misterios[t];
      const esHoy = t===hoy;
      const btn = document.createElement('button');
      btn.className = 'tipo-btn';
      btn.style.cssText = 'background:'+m.ac+(esHoy?';outline:3px solid '+m.acL+';outline-offset:2px':'');
      btn.onclick = ()=>elegirTipo(t);
      const nm = span({class:'tname'}, t);
      const dy = span({class:'tdays'}, m.dias);
      btn.appendChild(nm);
      btn.appendChild(dy);
      if(esHoy){ const b=span({class:'hoy-badge'},'hoy ✓'); btn.appendChild(b); }
      grid.appendChild(btn);
    });
    page.appendChild(grid);
    setMain(page);
    return;
  }

  if(s.type==='iniciales'){
    setUI(ac, 'Misterios '+tipo+'  ·  '+M.dias, '✦ Oraciones Iniciales ✦', true);
    const page = div({class:'page'});
    page.appendChild(div({class:'section-title', html:'Oraciones Iniciales'}));
    page.appendChild(divider());
    page.appendChild(div({class:'prayer-title', html:'Por la señal de la santa Cruz'}));
    page.appendChild(p({class:'prayer-text', html:O.senial}));
    page.appendChild(divider('opacity:.3'));
    page.appendChild(div({class:'prayer-title', html:'Acto de Contrición'}));
    page.appendChild(p({class:'prayer-text', html:O.contriccion}));
    setMain(page);
    return;
  }

  if(s.type==='cual-misterio'){
    setUI(ac, 'Misterios '+tipo+'  ·  '+M.dias, '✦ Misterios '+tipo+' ✦', true);
    const page = div({class:'page centered', style:'gap:10px'});
    page.appendChild(cross());
    page.appendChild(div({class:'big-title', style:'font-size:clamp(24px,5vw,56px)', html:'Misterios<br>'+tipo}));
    page.appendChild(div({class:'sub-title'}, M.dias));
    page.appendChild(divider());
    M.lista.forEach(m=>{
      const row = div({style:'display:flex;align-items:center;gap:12px;max-width:min(620px,90vw)'});
      const dot = div({style:'width:16px;height:16px;border-radius:50%;background:'+ac+';flex-shrink:0'});
      const txt = span({style:'font-size:clamp(11px,1.7vw,18px);color:var(--cream)'}, m.num+'. '+m.titulo);
      row.appendChild(dot); row.appendChild(txt);
      page.appendChild(row);
    });
    setMain(page);
    return;
  }

  if(s.type==='misterio'){
    const m = M.lista[s.idx];
    const ord = ['Primer','Segundo','Tercer','Cuarto','Quinto'][s.idx];
    setUI(ac, 'Misterios '+tipo+'  ·  '+m.num+' de V', '✦ '+ord+' Misterio '+tipo+' ✦', true);
    const page = div({class:'page'});
    const card = div({class:'mist-card'});
    const head = div({class:'mist-head'});
    const num = div({class:'mist-num', style:'background:'+ac+';border:2px solid '+acL}, m.num);
    const info = div({});
    info.appendChild(div({class:'mist-sub'}, ord+' Misterio '+tipo));
    info.appendChild(div({class:'mist-title', html:m.titulo}));
    head.appendChild(num); head.appendChild(info);
    card.appendChild(head);
    card.appendChild(divider('margin:0 0 12px;opacity:.4;width:100%'));
    card.appendChild(p({class:'mist-med', html:m.med}));
    const fruto = div({class:'mist-fruto'});
    fruto.innerHTML = '<b>Fruto del misterio:</b> '+M.frutos[s.idx];
    card.appendChild(fruto);
    page.appendChild(card);
    setMain(page);
    return;
  }

  if(s.type==='padre'){
    const m = M.lista[s.idx];
    setUI(ac, 'Misterio '+m.num+': '+m.titulo, '✦ Padre Nuestro · Misterio '+m.num+' ✦', true);
    const page = div({class:'page centered', style:'gap:12px'});
    page.appendChild(cross());
    page.appendChild(div({class:'section-title'}, 'Padre Nuestro'));
    page.appendChild(divider());
    page.appendChild(p({class:'prayer-text', style:'text-align:center;font-family:Georgia,serif;font-size:clamp(13px,2.1vw,22px);line-height:1.7', html:O.padreNuestro}));
    setMain(page);
    return;
  }

  if(s.type==='decenio'){
    const m = M.lista[s.idx];
    const cnt = s.cuenta||0;
    setUI(ac, 'Misterio '+m.num+': '+m.titulo+'  ·  Decenio', cnt<10?'✦ Ave María '+(cnt+1)+' de 10 ✦':'✦ Decenio completo — avanza ✦', true);
    const page = div({class:'page centered', style:'gap:10px'});
    page.appendChild(div({class:'section-title', style:'font-size:clamp(16px,3vw,34px)'}, 'Ave María'));
    const row = div({class:'cuentas-row'});
    for(let i=0;i<10;i++){
      const c = div({class:'cuenta'+(i<cnt?' marcada':'')}, String(i+1));
      c.style.cssText = i<cnt ? 'background:'+ac+';border-color:'+acL : '';
      row.appendChild(c);
    }
    page.appendChild(row);
    page.appendChild(divider());
    page.appendChild(p({class:'prayer-text', style:'text-align:center;font-size:clamp(12px,1.9vw,20px)', html:O.aveMaria}));
    setMain(page);
    return;
  }

  if(s.type==='trio'){
    if(s.jacIdx===undefined){ steps[cur]={...s,jacIdx:Math.floor(Math.random()*O.jaculatorias.length)}; }
    const m = M.lista[s.idx];
    const jac = O.jaculatorias[steps[cur].jacIdx];
    const esUlt = s.idx===4;
    setUI(ac, 'Fin del Misterio '+m.num, '✦ Gloria · Jaculatoria · Fátima ✦', true);
    const page = div({class:'page', style:'gap:14px'});
    page.appendChild(div({class:'prayer-title'}, 'Gloria'));
    page.appendChild(divider('background:'+ac));
    page.appendChild(p({class:'prayer-text', style:'text-align:center', html:O.gloria}));
    page.appendChild(divider('opacity:.3'));
    page.appendChild(div({class:'prayer-title'}, 'Jaculatoria'));
    page.appendChild(divider('background:'+acL));
    page.appendChild(p({class:'prayer-text', style:'text-align:center;font-style:italic', html:jac}));
    page.appendChild(divider('opacity:.3'));
    page.appendChild(div({class:'prayer-title'}, 'Oración de Fátima'));
    page.appendChild(divider('background:'+acL));
    page.appendChild(p({class:'prayer-text', style:'text-align:center', html:O.fatima}));
    setMain(page);
    return;
  }

  if(s.type==='intenciones'){
    const st = s.step||0;
    setUI('#3a3a00','Oraciones por las intenciones del Santo Padre','✦ Intenciones del Papa ✦', true);
    const page = div({class:'page centered', style:'gap:12px'});
    if(st===0){
      page.appendChild(div({class:'section-title', style:'font-size:clamp(14px,2.4vw,26px)', html:'Oraciones por las intenciones<br>de Su Santidad el Papa'}));
      page.appendChild(divider());
      page.appendChild(p({style:'font-size:clamp(11px,1.6vw,16px);color:var(--gray);text-align:center', html:'Un Padre Nuestro, tres Ave Marías<br>y la Salve por las intenciones del Romano Pontífice'}));
      page.appendChild(divider('opacity:.3'));
      page.appendChild(div({class:'prayer-title'}, 'Padre Nuestro'));
      page.appendChild(p({class:'prayer-text', style:'text-align:center;font-size:clamp(12px,1.8vw,19px)', html:O.padreNuestro}));
    } else if(st>=1 && st<=3){
      const ave = O.aveTrinidades[st-1];
      page.appendChild(div({class:'section-title', style:'font-size:clamp(13px,2vw,22px)', html:ave.titulo}));
      page.appendChild(divider());
      page.appendChild(p({class:'prayer-text', style:'text-align:center;font-size:clamp(12px,1.8vw,19px)', html:ave.texto}));
      const dots = div({style:'display:flex;gap:10px;margin-top:8px'});
      for(let i=1;i<=3;i++){
        const d = div({style:'width:22px;height:22px;border-radius:50%;border:1.5px solid var(--gold);background:'+(i<=st?'var(--gold)':'var(--navy3)')});
        dots.appendChild(d);
      }
      page.appendChild(dots);
    } else if(st===4){
      page.appendChild(div({class:'section-title'}, 'Salve Regina'));
      page.appendChild(divider());
      page.appendChild(p({class:'prayer-text', style:'text-align:center;font-size:clamp(12px,1.9vw,20px)', html:O.salve}));
    }
    setMain(page);
    return;
  }

  if(s.type==='letanias'){
    const li = s.letIdx||0;
    const lets = O.letanias;
    setUI('#2a2040','Letanías Lauretanas','✦ Letanías · '+(li+1)+' de '+lets.length+' ✦', true);
    const page = div({class:'page', style:'gap:8px'});
    page.appendChild(div({class:'section-title', style:'font-size:clamp(14px,2.4vw,26px)'}, 'Letanías Lauretanas'));
    page.appendChild(p({style:'font-size:clamp(9px,1.3vw,13px);color:var(--gold);font-style:italic;margin-bottom:4px'}, 'R. Ruega por nosotros'));
    const SHOW=9, start=Math.max(0,li-3), end=Math.min(lets.length,start+SHOW);
    const list = div({class:'let-list'});
    for(let i=start;i<end;i++){
      const activa=i===li, marcada=i<li;
      const row = div({class:'let-row'+(activa?' activa':'')});
      const marker = div({class:'let-marker'+(marcada||activa?' on':'')});
      const inv = span({class:'let-inv', style:activa?'color:var(--goldL);font-weight:600':''}, lets[i].v);
      row.appendChild(marker); row.appendChild(inv);
      if(activa){ row.appendChild(span({class:'let-resp'}, lets[i].r)); }
      list.appendChild(row);
    }
    page.appendChild(list);
    const barWrap = div({style:'display:flex;align-items:center;gap:6px;margin-top:4px;width:100%;max-width:min(900px,94vw)'});
    const fill = div({style:'height:3px;border-radius:2px;background:var(--gold);flex:'+(li+1)});
    const empty = div({style:'height:3px;border-radius:2px;background:var(--navy3);flex:'+(lets.length-li-1)});
    const lbl = span({style:'font-size:11px;color:var(--gray);margin-left:4px;flex-shrink:0'}, (li+1)+'/'+lets.length);
    barWrap.appendChild(fill); barWrap.appendChild(empty); barWrap.appendChild(lbl);
    page.appendChild(barWrap);
    setMain(page);
    return;
  }

  if(s.type==='oracion-final'){
    setUI('#1a2c1a','Oración Final','✦ Deo Gratias ✦', true);
    const page = div({class:'page centered', style:'gap:12px'});
    page.appendChild(cross());
    page.appendChild(div({class:'section-title'}, 'Bajo Tu Amparo'));
    page.appendChild(divider());
    page.appendChild(p({class:'prayer-text', style:'text-align:center;font-family:Georgia,serif;font-size:clamp(13px,2vw,22px);line-height:1.7', html:O.oracionFinal}));
    setMain(page);
    return;
  }

  if(s.type==='cierre-final'){
    setUI('transparent','','✦ Deo Gratias ✦', true);
    const page = div({class:'page centered', style:'gap:14px'});
    page.appendChild(cross());
    page.appendChild(div({class:'section-title'}, 'Ave María Purísima'));
    page.appendChild(divider());
    page.appendChild(p({class:'prayer-text', style:'text-align:center;font-family:Georgia,serif;font-size:clamp(16px,2.8vw,30px);line-height:1.8;color:var(--goldL);font-style:italic'}, 'R. Sin pecado concebida.'));
    page.appendChild(divider('opacity:.3'));
    const cierre = p({class:'prayer-text', style:'text-align:center;font-size:clamp(13px,2vw,22px);line-height:2', html:'En el nombre del Padre,<br>y del Hijo,<br>y del Espíritu Santo.<br><span style="color:var(--goldL);font-weight:bold">Amén.</span>'});
    page.appendChild(cierre);
    page.appendChild(divider('opacity:.2'));
    const btn = document.createElement('button');
    btn.className = 'btn-ghost';
    btn.textContent = 'Rezar de nuevo';
    btn.onclick = reiniciar;
    page.appendChild(btn);
    setMain(page);
    return;
  }
}

// ── Navigation ─────────────────────────────────────────────────────────────
function advance(){
  const s = steps[cur];
  if(s.type==='decenio' && (s.cuenta||0)<10){ steps[cur]={...s,cuenta:(s.cuenta||0)+1}; render(); return; }
  if(s.type==='intenciones' && (s.step||0)<4){ steps[cur]={...s,step:(s.step||0)+1}; render(); return; }
  if(s.type==='letanias' && (s.letIdx||0)<DATA.oraciones.letanias.length-1){ steps[cur]={...s,letIdx:(s.letIdx||0)+1}; render(); return; }
  if(cur<steps.length-1){ cur++; render(); }
}

function goBack(){
  const s = steps[cur];
  if(s.type==='decenio' && (s.cuenta||0)>0){ steps[cur]={...s,cuenta:(s.cuenta||0)-1}; render(); return; }
  if(s.type==='intenciones' && (s.step||0)>0){ steps[cur]={...s,step:(s.step||0)-1}; render(); return; }
  if(s.type==='letanias' && (s.letIdx||0)>0){ steps[cur]={...s,letIdx:(s.letIdx||0)-1}; render(); return; }
  if(cur>0){ cur--; render(); }
}

function elegirTipo(t){ buildSteps(t); cur=1; render(); }
function reiniciar(){ cur=0; buildSteps(tipo); render(); }
function irAlInicio(){ cur=0; render(); }

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter') advance();
  else if(e.key==='ArrowLeft') goBack();
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){ dx<0?advance():goBack(); }
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>40){ dy<0?advance():goBack(); }
});
document.addEventListener('click',e=>{
  if(e.target.closest('button')) return;
  advance();
});

// ── Init ───────────────────────────────────────────────────────────────────
buildSteps(detectarTipo());
render();
</script>
