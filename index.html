<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Santo Rosario</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --navy:#0D1B2A;--navy2:#132236;--navy3:#1A2C42;
    --gold:#C9A84C;--goldL:#E8C97A;--cream:#F5EDD6;
    --gray:#8FA3B1;--dim:#1A2C42;
    --g-green:#2E7D32;--g-greenL:#66BB6A;
    --g-blue:#1565C0;--g-blueL:#5B9BD5;
    --g-purple:#6A1F7A;--g-purpleL:#AB47BC;
    --g-red:#8B1A1A;--g-redL:#E53935;
  }
  html{height:100%;height:-webkit-fill-available}
  body{min-height:100%;min-height:-webkit-fill-available;overflow:hidden;background:var(--navy);color:var(--cream);font-family:system-ui,sans-serif;touch-action:none;display:flex;flex-direction:column}
  .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2vw;opacity:0;pointer-events:none;transition:opacity .35s;-webkit-overflow-scrolling:touch}
  .screen.active{opacity:1;pointer-events:all}

  /* topbar */
  .topbar{position:absolute;top:0;left:0;right:0;height:36px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;letter-spacing:.04em;z-index:10}
  .home-btn{position:absolute;top:0;left:0;height:36px;padding:0 14px;display:flex;align-items:center;cursor:pointer;color:rgba(255,255,255,.75);font-size:18px;z-index:11;background:transparent;border:none}
  .home-btn:active{color:#fff}

  /* progress bar */
  .progress-wrap{position:absolute;top:36px;left:0;right:0;height:3px;background:rgba(255,255,255,.1);z-index:9}
  .progress-fill{height:100%;background:var(--gold);transition:width .4s;width:0%}

  /* bottombar */
  .bottombar{position:absolute;bottom:0;left:0;right:0;height:28px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.06em}

  /* cross */
  .cross{width:clamp(28px,5vw,48px);height:clamp(36px,6.5vw,60px);position:relative;margin-bottom:12px}
  .cross::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:32%;height:100%;background:var(--gold)}
  .cross::after{content:'';position:absolute;top:36%;left:0;right:0;height:28%;background:var(--gold)}

  /* titles */
  .big-title{font-family:Georgia,serif;font-size:clamp(28px,6vw,72px);color:var(--gold);font-weight:700;text-align:center;letter-spacing:.04em;line-height:1.1}
  .sub-title{font-family:Georgia,serif;font-size:clamp(13px,2.2vw,24px);color:var(--cream);font-style:italic;text-align:center;margin-top:6px}
  .section-title{font-family:Georgia,serif;font-size:clamp(18px,3.5vw,42px);color:var(--gold);font-weight:700;text-align:center;margin-bottom:12px}
  .section-sub{font-size:clamp(10px,1.6vw,16px);color:var(--gray);text-align:center;margin-bottom:16px}
  .prayer-text{font-size:clamp(12px,2vw,22px);color:var(--cream);text-align:justify;line-height:1.65;max-width:min(820px,90vw);width:100%}
  .prayer-title{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,28px);color:var(--goldL);font-weight:700;text-align:center;margin-bottom:8px}
  .divider{width:60%;max-width:320px;height:1px;background:var(--gold);margin:12px auto;opacity:.6}

  /* btn */
  .btn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:14px clamp(24px,5vw,56px);font-size:clamp(13px,2vw,22px);font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .2s}
  .btn:active{opacity:.8}
  .btn-ghost{background:transparent;border:1.5px solid var(--gold);color:var(--gold);border-radius:6px;padding:11px clamp(16px,3vw,36px);font-size:clamp(11px,1.6vw,18px);font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-ghost:active{opacity:.7}

  /* misterio type buttons */
  .tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.5vw,20px);max-width:min(700px,92vw);width:100%;margin:16px 0}
  .tipo-btn{border:none;border-radius:8px;padding:14px clamp(12px,2vw,24px);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:opacity .2s}
  .tipo-btn:active{opacity:.8}
  .tipo-btn .tname{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,26px);color:#fff;font-weight:700}
  .tipo-btn .tdays{font-size:clamp(9px,1.3vw,14px);color:rgba(255,255,255,.8);font-style:italic}

  /* cuenta row */
  .cuentas-row{display:flex;gap:clamp(6px,1.5vw,18px);align-items:center;justify-content:center;margin:16px 0}
  .cuenta{width:clamp(28px,5vw,52px);height:clamp(28px,5vw,52px);border-radius:50%;border:2px solid var(--acL,var(--gold));background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:clamp(10px,1.6vw,16px);font-weight:700;color:var(--gray);transition:background .25s,color .25s}
  .cuenta.marcada{background:var(--ac,var(--gold));color:#fff;border-color:var(--acL,var(--goldL))}

  /* letania row */
  .let-list{max-width:min(900px,94vw);width:100%;display:flex;flex-direction:column;gap:0}
  .let-row{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);padding:6px clamp(10px,2vw,18px);border-radius:6px;transition:background .2s}
  .let-row.activa{background:rgba(201,168,76,.12)}
  .let-marker{width:clamp(10px,1.8vw,16px);height:clamp(10px,1.8vw,16px);border-radius:50%;border:1.5px solid var(--gold);background:transparent;flex-shrink:0;transition:background .25s}
  .let-marker.on{background:var(--gold)}
  .let-inv{font-size:clamp(11px,1.8vw,20px);color:var(--cream);flex:1}
  .let-resp{font-size:clamp(9px,1.4vw,16px);color:var(--goldL);font-style:italic;flex-shrink:0}

  /* misterio card */
  .mist-card{background:var(--navy3);border-radius:10px;padding:clamp(12px,2.5vw,32px);max-width:min(860px,92vw);width:100%;border:1px solid rgba(201,168,76,.25)}
  .mist-num{width:clamp(36px,6vw,60px);height:clamp(36px,6vw,60px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,2.2vw,22px);font-weight:700;color:#fff;flex-shrink:0}
  .mist-head{display:flex;align-items:center;gap:clamp(8px,1.5vw,18px);margin-bottom:12px}
  .mist-title{font-family:Georgia,serif;font-size:clamp(14px,2.4vw,28px);color:var(--gold);font-weight:700;line-height:1.2}
  .mist-sub{font-size:clamp(9px,1.3vw,14px);color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
  .mist-med{font-size:clamp(12px,1.9vw,21px);color:var(--cream);line-height:1.6;text-align:justify}
  .mist-fruto{margin-top:12px;padding:clamp(8px,1.5vw,16px);background:rgba(0,0,0,.2);border-radius:6px;border-left:3px solid var(--ac,var(--gold));font-size:clamp(10px,1.5vw,16px);color:var(--gray)}
  .mist-fruto b{color:var(--goldL)}

  /* nav hint */
  .nav-hint{position:fixed;bottom:32px;left:0;right:0;text-align:center;font-size:clamp(8px,1.2vw,13px);color:var(--gray);pointer-events:none;opacity:.7}

  /* responsive scroll for overflow */
  .scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 16px;flex:1}
  .scroll-area.centered{justify-content:center}

  /* trio (gloria/jac/fatima) */
  .trio-block{max-width:min(820px,92vw);width:100%;display:flex;flex-direction:column;gap:16px}
  .trio-item{text-align:center}
  .trio-item .prayer-text{text-align:center}

  /* intenciones*/
  .int-aves{display:flex;flex-direction:column;gap:8px;max-width:min(820px,92vw);width:100%}
  .int-ave-row{display:flex;align-items:center;gap:1vw}
  .int-circle{width:clamp(20px,3.5vw,36px);height:clamp(20px,3.5vw,36px);border-radius:50%;border:1.5px solid var(--gold);background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:clamp(9px,1.3vw,14px);font-weight:700;color:var(--gray);transition:background .25s,color .25s;flex-shrink:0}
  .int-circle.on{background:var(--gold);color:var(--navy)}

  @media(orientation:portrait){
    .tipo-grid{grid-template-columns:1fr 1fr}
    .cuentas-row{gap:clamp(4px,2vw,14px)}
    .let-resp{display:none}
  }
</style>
</head>
<body>

<div class="topbar" id="topbar"></div>
<div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
<div class="bottombar" id="bottombar">✦ Ad Maiorem Dei Gloriam ✦</div>
<div class="nav-hint" id="navhint">Toca, presiona Enter o desliza para avanzar</div>

<button class="home-btn" id="homeBtn" title="Ir al inicio" onclick="irAlInicio()" style="display:none">⌂</button>
<div id="app" style="position:absolute;top:0;left:0;right:0;bottom:0;"></div>

<script>
const DATA = {
  misterios:{
    Gozosos:{ac:'#2E7D32',acL:'#66BB6A',dias:'Lunes y Sábado',
      frutos:['La humildad','La caridad fraterna','El desprendimiento','La obediencia y la pobreza','El amor a Dios'],
      lista:[
        {num:'I',  titulo:'La Anunciación del Ángel a María',med:'El Ángel Gabriel anuncia a María que será la Madre del Salvador. Contemplamos el momento en que María dice «sí» a Dios y el Verbo se hace carne en su seno purísimo.'},
        {num:'II', titulo:'La Visitación de María a su prima Isabel',med:'María, llena de gozo, visita a Isabel. Al escuchar el saludo de María, el niño Juan salta de gozo en el vientre de su madre, y el Espíritu Santo habla por boca de Isabel.'},
        {num:'III',titulo:'El Nacimiento de Jesús en Belén',med:'El Hijo de Dios nace pobre y humilde en un pesebre de Belén. Los ángeles cantan gloria a Dios en el cielo, y los pastores y los reyes magos vienen a adorarlo.'},
        {num:'IV', titulo:'La Presentación de Jesús en el Templo',med:'María y José presentan al Niño Jesús en el Templo de Jerusalén. El anciano Simeón, movido por el Espíritu Santo, lo reconoce como luz para iluminar a las naciones.'},
        {num:'V',  titulo:'El Niño Jesús hallado en el Templo',med:'Perdido durante tres días, Jesús es hallado en el Templo entre los doctores, que admiran su sabiduría. A sus padres les dice: «¿No sabíais que debo ocuparme de las cosas de mi Padre?»'},
      ]},
    Luminosos:{ac:'#1565C0',acL:'#5B9BD5',dias:'Jueves',
      frutos:['La apertura a la fe','La intercesión de María','La conversión','La contemplación','La adoración eucarística'],
      lista:[
        {num:'I',  titulo:'El Bautismo de Jesús en el Jordán',med:'Al ser bautizado por Juan, los cielos se abren, el Espíritu desciende como paloma sobre Jesús y el Padre proclama: «Éste es mi Hijo amado, en quien me complazco».'},
        {num:'II', titulo:'Las Bodas de Caná',med:'A petición de María, Jesús convierte el agua en vino realizando su primera señal. María dice a los sirvientes: «Haced lo que Él os diga». Sus discípulos creen en Él.'},
        {num:'III',titulo:'El Anuncio del Reino de Dios',med:'Jesús proclama el Reino de Dios, llama a la conversión y perdona los pecados. Con palabras y milagros revela el rostro misericordioso del Padre.'},
        {num:'IV', titulo:'La Transfiguración en el Monte Tabor',med:'El rostro de Jesús brilla como el sol y sus vestidos se vuelven deslumbrantes. El Padre proclama: «Éste es mi Hijo amado; escuchadle». Los apóstoles caen en tierra sobrecogidos.'},
        {num:'V',  titulo:'La Institución de la Eucaristía',med:'En la Última Cena, Jesús toma el pan y el vino: «Ésto es mi Cuerpo... ésta es mi Sangre». Instituye el sacerdocio y deja la Eucaristía como memorial perpetuo de su amor.'},
      ]},
    Dolorosos:{ac:'#6A1F7A',acL:'#AB47BC',dias:'Martes y Viernes',
      frutos:['La contrición','La mortificación','La corona de virtudes','La paciencia en el sufrimiento','La perseverancia'],
      lista:[
        {num:'I',  titulo:'La Oración de Jesús en el Huerto',med:'En Getsemaní, Jesús ora al Padre con angustia mortal y suda sangre. Sin embargo, entrega su voluntad: «No se haga la mía, sino la tuya».'},
        {num:'II', titulo:'La Flagelación de Jesús',med:'Jesús es atado a la columna y azotado sin piedad. Ofrece en silencio su sangre y su dolor por la redención de nuestros pecados y la conversión de los pecadores.'},
        {num:'III',titulo:'La Coronación de Espinas',med:'Los soldados trenzan una corona de espinas, la clavan en la cabeza de Jesús, le ponen un manto de púrpura y se burlan de Él gritando: «¡Salve, Rey de los judíos!»'},
        {num:'IV', titulo:'Jesús carga la Cruz camino al Calvario',med:'Jesús carga la pesada Cruz por las calles de Jerusalén. Cae varias veces, pero se levanta. En el camino encuentra a su Santísima Madre y al Cirineo que lo ayuda.'},
        {num:'V',  titulo:'La Crucifixión y Muerte de Jesús',med:'Jesús es clavado en la Cruz entre dos ladrones. Desde allí perdona a sus verdugos, encomienda a Juan el cuidado de María y ofrece su vida: «Padre, en tus manos encomiendo mi espíritu». El velo del templo se rasga.'},
      ]},
    Gloriosos:{ac:'#8B1A1A',acL:'#E53935',dias:'Miércoles y Domingo',
      frutos:['La fe viva','La esperanza del cielo','El don del Espíritu Santo','La devoción a María','El deseo del cielo'],
      lista:[
        {num:'I',  titulo:'La Resurrección de Jesús',med:'Al tercer día, Jesús resucita glorioso de entre los muertos, venciendo la muerte y el pecado. Se aparece a María Magdalena, a los discípulos de Emaús y a los apóstoles reunidos.'},
        {num:'II', titulo:'La Ascensión de Jesús al Cielo',med:'Cuarenta días después de la Resurrección, Jesús asciende glorioso al cielo en el Monte de los Olivos ante sus discípulos. Les promete el Espíritu Santo y los envía a evangelizar.'},
        {num:'III',titulo:'La Venida del Espíritu Santo',med:'Reunidos con María en el Cenáculo, los apóstoles reciben al Espíritu Santo en forma de lenguas de fuego. Llenos de fortaleza, salen a anunciar el Evangelio. La Iglesia nace.'},
        {num:'IV', titulo:'La Asunción de María al Cielo',med:'Terminado el curso de su vida terrena, la Virgen María es asunta en cuerpo y alma a la gloria celestial. Es signo de esperanza y consuelo para los peregrinos en la tierra.'},
        {num:'V',  titulo:'La Coronación de María como Reina',med:'María es coronada Reina del cielo y de la tierra por la Santísima Trinidad, exaltada por encima de todos los ángeles y santos como Madre e intercesora de la humanidad.'},
      ]},
  },
  oraciones:{
    senial:'Por la señal de la santa Cruz, de nuestros enemigos, líbranos, Señor, Dios nuestro. <br> En el nombre del Padre, y del Hijo, y del Espíritu Santo. Amén.',
    contriccion:'Señor mío Jesucristo, Dios y hombre verdadero, creador, padre, y redentor mío. Por ser tú quien eres, y porque te amo sobre todas las cosas, me pesa de todo corazón haberte ofendido. Quiero y propongo firmemente nunca más pecar, enmendarme, confesarme, y cumplir la penitencia que me fuere impuesta. Te ofrezco, Señor, mi vida, obras, y trabajos, en reparación de todos mis pecados. Y así como te suplico, así confío en tu bondad y misericordia infinitas, que me los perdonarás, y me darás las gracias necesarias para nunca más pecar. Amén.',
    padreNuestro:'Padre nuestro, que estás en el cielo, santificado sea tu nombre; venga a nosotros tu reino; hágase tu voluntad en la tierra como en el cielo. Danos hoy nuestro pan de cada día; perdona nuestras ofensas, como también nosotros perdonamos a los que nos ofenden; no nos dejes caer en la tentación, y líbranos del mal. Amén.',
    aveMaria:'Dios te salve, María, llena eres de gracia, el Señor está contigo. Bendita tú eres entre todas las mujeres, y bendito es el fruto de tu vientre, Jesús. <br>Santa María, Madre de Dios, ruega por nosotros pecadores, ahora y en la hora de nuestra muerte. Amén.',
    gloria:'Gloria al Padre, y al Hijo, y al Espíritu Santo.<br>Como era en el principio, ahora y siempre, por los siglos de los siglos. Amén.',
    jaculatoria:'Por tu limpia concepción ¡Oh soberana princesa!<br>R. Una muy grande pureza te pido de corazón.',
    jaculatoria2:'María, Madre de Gracia y Madre de Misericordia.<br>R. En la vida y en la muerte ampáranos Gran Señora.',
    jaculatoria3:'Ave, María Purísima.<br>R. Sin pecado concebida.',
    fatima:'Oh Jesús mío, perdona nuestras culpas, líbranos del fuego del infierno, lleva al cielo a todas las almas, especialmente a las más necesitadas de tu misericordia.',
    aveTrinidades:[
      {titulo:'Dios te salve, María Santísima, Hija de Dios Padre',texto:'Dios te salve, María Santísima, Hija de Dios Padre, virgen purísima antes del parto. En tus manos ponemos nuestra fé para que la ilumines. Llena eres de gracia; el Señor está contigo. Bendita tú eres entre todas las mujeres, y bendito es el fruto de tu vientre, Jesús.<br>Santa María, Madre de Dios, ruega por nosotros pecadores, ahora y en la hora de nuestra muerte. Amén.'},
      {titulo:'Dios te salve, María Santísima, Madre de Dios Hijo',texto:'Dios te salve, María Santísima, Madre de Dios Hijo, virgen purísima en el parto. En tus manos ponemos nuestra esperanza para que la alientes. Llena eres de gracia; el Señor es contigo. Bendita tú eres entre todas las mujeres, y bendito es el fruto de tu vientre, Jesús.<br>Santa María, Madre de Dios, ruega por nosotros pecadores, ahora y en la hora de nuestra muerte. Amén.'},
      {titulo:'Dios te salve, María Santísima, Esposa de Dios Espíritu Santo',texto:'Dios te salve, María Santísima, Esposa de Dios Espíritu Santo, virgen purísima después del parto. En tus manos ponemos nuestra caridad para que la inflames, nuestras necesidades para que las remedies, y nuestras almas para que las salves. Llena eres de gracia; el Señor es contigo. Bendita tú eres entre todas las mujeres, y bendito es el fruto de tu vientre, Jesús.<br>Santa María, Madre de Dios, ruega por nosotros pecadores, ahora y en la hora de nuestra muerte. Amén.'},
    ],
    salve:'Dios te salve, María Santísima, templo, trono y sagrario de la Santísima Trinidad, virgen concebida sin la culpa del pecado original, Amén. <br><br> Dios te salve, Reina y Madre, madre de misericordia, vida, dulzura y esperanza nuestra. Dios te salve. A ti llamamos los desterrados hijos de Eva; a ti suspiramos, gimiendo y llorando en este valle de lágrimas. Ea, pues, Señora abogada nuestra, vuelve a nosotros esos tus ojos misericordiosos; y después de este destierro, muéstranos a Jesús, fruto bendito de tu vientre. ¡Oh clemente!, ¡Oh piadosa!, ¡Oh dulce siempre Virgen María! Ruega por nosotros, Santa Madre de Dios, para que seamos dignos de alcanzar las divinas gracias y promesas de Jesucristo. Amén.',
    letanias:[
      'Santa María','Santa Madre de Dios','Santa Virgen de las Vírgenes',
      'Madre de Cristo','Madre de la Iglesia','Madre de la misericordia',
      'Madre de la divina gracia','Madre purísima',
      'Madre castísima','Madre siempre virgen','Madre inmaculada',
      'Madre amable','Madre admirable','Madre del buen consejo',
      'Madre del Creador','Madre del Salvador','Madre de la familia',
      'Virgen prudentísima','Virgen digna de veneración','Virgen digna de alabanza',
      'Virgen poderosa','Virgen clemente','Virgen fiel',
      'Espejo de justicia','Trono de la sabiduría','Causa de nuestra alegría',
      'Vaso espiritual','Vaso digno de honor','Vaso de insigne devoción',
      'Rosa mística','Torre de David','Torre de marfil',
      'Casa de oro','Arca de la Alianza','Puerta del cielo',
      'Estrella de la mañana','Salud de los enfermos','Refugio de los pecadores',
      'Consuelo de los afligidos','Auxilio de los cristianos',
      'Reina de los Ángeles','Reina de los Patriarcas','Reina de los Profetas',
      'Reina de los Apóstoles','Reina de los Mártires','Reina de los Confesores',
      'Reina de las Vírgenes','Reina de todos los Santos',
      'Reina concebida sin pecado original','Reina llevada al cielo',
      'Reina del Santísimo Rosario','Reina de la familia','Reina de la paz'
    ],
    oracionFinal:'Bajo tu amparo nos acogemos, Santa Madre de Dios; no desprecies las súplicas que te dirigimos en nuestras necesidades, antes bien líbranos siempre de todo peligro, ¡Oh Virgen gloriosa y bendita!<br>Ruega por nosotros Santa Madre de Dios, para que seamos dignos de alcanzar las divinas gracias y promesas de nuestro Señor Jesucristo. Amén.',
  }
};

const DIAS={0:'Gloriosos',1:'Gozosos',2:'Dolorosos',3:'Gloriosos',4:'Luminosos',5:'Dolorosos',6:'Gozosos'};

let steps=[], cur=0, tipo='Gozosos', letIdx=0, intStep=0;

function detectarTipo(){return DIAS[new Date().getDay()];}

function buildSteps(t){
  tipo=t; const M=DATA.misterios[t]; const O=DATA.oraciones;
  steps=[];

  steps.push({type:'portada'});
  steps.push({type:'iniciales'});
  steps.push({type:'cual-misterio'});

  for(let i=0;i<5;i++){
    steps.push({type:'misterio',idx:i});
    steps.push({type:'padre',idx:i});
    steps.push({type:'decenio',idx:i,cuenta:0});
    steps.push({type:'trio',idx:i});
  }

  steps.push({type:'intenciones',step:0});
  steps.push({type:'salve'});
  steps.push({type:'letanias-intro'});
  steps.push({type:'letanias',letIdx:0});
  steps.push({type:'letanias-cierre'});
  steps.push({type:'oracion-final'});
}

function totalScreens(){return steps.length;}

function pct(){
  if(cur<=0)return 0;
  return Math.round((cur/(steps.length-1))*100);
}

function acColor(prop='ac'){
  const M=DATA.misterios[tipo];
  return prop==='ac'?M.ac:M.acL;
}

function render(){
  const s=steps[cur];

  if(hb) hb.style.display=cur>0?'flex':'none';

  const M=DATA.misterios[tipo];

function elegirTipo(t){
  buildSteps(t);
  cur=1;
  render();
}

function reiniciar(){
  cur=0; buildSteps(tipo); render();
}

function irAlInicio(){
  cur=0; render();
}

function advance(){
  const s=steps[cur];

  if(s.type==='decenio'){
    const cnt=s.cuenta||0;
    if(cnt<10){steps[cur]={...s,cuenta:cnt+1};render();return;}
  }
  if(s.type==='intenciones'){
    const st=s.step||0;
    if(st<4){steps[cur]={...s,step:st+1};render();return;}
  }
  if(s.type==='letanias'){
    const li=s.letIdx||0;
    if(li<DATA.oraciones.letanias.length-1){steps[cur]={...s,letIdx:li+1};render();return;}
  }

  if(cur<steps.length-1){cur++;render();}
}

function goBack(){
  const s=steps[cur];
  if(s.type==='decenio'&&(s.cuenta||0)>0){steps[cur]={...s,cuenta:(s.cuenta||0)-1};render();return;}
  if(s.type==='intenciones'&&(s.step||0)>0){steps[cur]={...s,step:(s.step||0)-1};render();return;}
  if(s.type==='letanias'&&(s.letIdx||0)>0){steps[cur]={...s,letIdx:(s.letIdx||0)-1};render();return;}
  if(cur>0){cur--;render();}
}

// ─── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter')advance();
  else if(e.key==='ArrowLeft')goBack();
});

// ─── Touch / Swipe ──────────────────────────────────────────────────────────
let tx0=0,ty0=0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?advance():goBack();}
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>40){dy<0?advance():goBack();}
});

// ─── Click avance ────────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  if(e.target.closest('button')||e.target.closest('.tipo-btn'))return;
  advance();
});

// ─── Init ────────────────────────────────────────────────────────────────────
buildSteps(detectarTipo());
render();
</script>
